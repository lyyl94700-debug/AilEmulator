name: Build AliEmulator APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/cyber/g99emulator
        mkdir -p app/src/main/res/layout
        
        # نقل ملفات الجافا
        mv MainActivity.java app/src/main/java/com/cyber/g99emulator/
        mv JoystickView.java app/src/main/java/com/cyber/g99emulator/
        mv GameOverlayService.java app/src/main/java/com/cyber/g99emulator/
        
        # نقل ملفات الواجهة
        mv activity_main.xml app/src/main/res/layout/
        if [ -f overlay_controls.xml ]; then
          mv overlay_controls.xml app/src/main/res/layout/
        elif [ -f layout/overlay_controls.xml ]; then
          mv layout/overlay_controls.xml app/src/main/res/layout/
        fi
        
        # نقل المانيفست والـ gradle
        mv AndroidManifest.xml app/src/main/
        mv build.gradle app/
        
        # إنشاء ملف settings.gradle الضروري للبناء
        echo "include ':app'" > settings.gradle

    - name: Grant execute permission for gradlew
      run: |
        cd app
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AliEmulator-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
