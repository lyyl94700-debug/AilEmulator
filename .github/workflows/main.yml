name: Build AliEmulator APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android Project From Scratch
      run: |
        # إنشاء الهيكل الرسمي المضمون لأندرويد ستوديو
        mkdir -p app/src/main/java/com/cyber/g99emulator
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        # البحث عن الملفات في المجلد الرئيسي أو المجلد الفرعي ونقلها بدقة
        if [ -d "AliEmulator" ]; then SRC="AliEmulator"; else SRC="."; fi

        cp $SRC/MainActivity.java app/src/main/java/com/cyber/g99emulator/ || true
        cp $SRC/JoystickView.java app/src/main/java/com/cyber/g99emulator/ || true
        cp $SRC/GameOverlayService.java app/src/main/java/com/cyber/g99emulator/ || true
        cp $SRC/activity_main.xml app/src/main/res/layout/ || true
        cp $SRC/overlay_controls.xml app/src/main/res/layout/ || true

        # كتابة ملف Manifest نظيف ومتوافق تلقائياً لمنع أي خطأ بناء
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <application
                android:allowBackup="true"
                android:label="AliEmulator"
                android:supportsRtl="true"
                android:theme="@style/Theme.AliEmulator">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <service android:name=".GameOverlayService" android:exported="false" />
            </application>
        </manifest>
        EOF

        # إنشاء ملفات إعدادات الـ Gradle الرسمية المتوافقة مع السيرفر
        echo "include ':app'" > settings.gradle

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.cyber.g99emulator'
            compileSdk 34
            defaultConfig {
                applicationId "com.cyber.g99emulator"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.AliEmulator" parent="Theme.MaterialComponents.DayNight.NoActionBar" />
        </resources>
        EOF

    - name: Setup Gradle and Build APK
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Result
      uses: actions/upload-artifact@v4
      with:
        name: AliEmulator-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
