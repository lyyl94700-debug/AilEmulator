ضname: Build AliEmulator APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Complete Android Project
      run: |
        # 1. إنشاء هيكل المجلدات الرسمي لأندرويد ستوديو
        mkdir -p app/src/main/java/com/cyber/g99emulator
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        # 2. تحديد مكان الملفات المرفوعة
        if [ -d "AliEmulator" ]; then
          SRC_DIR="AliEmulator"
        else
          SRC_DIR="."
        fi

        # 3. نقل وتوزيع الملفات إلى أماكنها الصحيحة مجدداً
        cp $SRC_DIR/MainActivity.java app/src/main/java/com/cyber/g99emulator/ || true
        cp $SRC_DIR/JoystickView.java app/src/main/java/com/cyber/g99emulator/ || true
        cp $SRC_DIR/GameOverlayService.java app/src/main/java/com/cyber/g99emulator/ || true
        cp $SRC_DIR/activity_main.xml app/src/main/res/layout/ || true
        
        if [ -f "$SRC_DIR/overlay_controls.xml" ]; then
          cp $SRC_DIR/overlay_controls.xml app/src/main/res/layout/
        elif [ -f "$SRC_DIR/layout/overlay_controls.xml" ]; then
          cp $SRC_DIR/layout/overlay_controls.xml app/src/main/res/layout/
        fi

        cp $SRC_DIR/AndroidManifest.xml app/src/main/ || true

        # 4. إنشاء ملفات البناء الأساسية والإعدادات من الصفر لضمان عدم وجود نقص
        echo "include ':app'" > settings.gradle

        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF

        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.cyber.g99emulator'
            compileSdk 34
            defaultConfig {
                applicationId "com.cyber.g99emulator"
                minSdk 24
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
        }
        EOF

        # 5. إنشاء ملف الألوان والثيمات الأساسي حتى لا يعترض المترجم
        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.AliEmulator" parent="Theme.MaterialComponents.DayNight.NoActionBar" />
        </resources>
        EOF

    - name: Setup Gradle and Build APK
      run: |
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Result
      uses: actions/upload-artifact@v4
      with:
        name: AliEmulator-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
