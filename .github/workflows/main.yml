صname: Build AliEmulator APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Project Structure
      run: |
        mkdir -p app/src/main/java/com/cyber/g99emulator
        mkdir -p app/src/main/res/layout
        
        # تحديد المسار الصحيح بناءً على رفعك للملفات
        if [ -d "AliEmulator" ]; then
          BASE_DIR="AliEmulator"
        else
          BASE_DIR="."
        fi
        
        # نقل ملفات الجافا
        mv $BASE_DIR/MainActivity.java app/src/main/java/com/cyber/g99emulator/ || true
        mv $BASE_DIR/JoystickView.java app/src/main/java/com/cyber/g99emulator/ || true
        mv $BASE_DIR/GameOverlayService.java app/src/main/java/com/cyber/g99emulator/ || true
        
        # نقل ملفات الواجهة
        mv $BASE_DIR/activity_main.xml app/src/main/res/layout/ || true
        if [ -f "$BASE_DIR/overlay_controls.xml" ]; then
          mv $BASE_DIR/overlay_controls.xml app/src/main/res/layout/
        elif [ -f "$BASE_DIR/layout/overlay_controls.xml" ]; then
          mv $BASE_DIR/layout/overlay_controls.xml app/src/main/res/layout/
        fi
        
        # نقل المانيفست والـ gradle
        mv $BASE_DIR/AndroidManifest.xml app/src/main/ || true
        mv $BASE_DIR/build.gradle app/ || true
        
        # إنشاء ملف settings.gradle
        echo "include ':app'" > settings.gradle

    - name: Grant execute permission and Build
      run: |
        cd app
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AliEmulator-Debug-APK
        path: app/build/outputs/apk/debug/*.apk
